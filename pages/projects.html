<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>duche - projects</title>

  <link rel="icon" href="/favicon.ico">

  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/projects.css">
</head>
<body>

  <hr>

  <main>
    <div class="main-content">
      <h1>Explore my projects inside my terminal</h1>

      <div class="terminal">
        <div class="terminal-titlebar">
          <div class="terminal-titlebar--actions">
            <div class="action close"></div>
            <div class="action minimize"></div>
            <div class="action maximize"></div>
          </div>

          <div class="terminal-titlebar--title">
            <span>Terminal ~</span>
            <span id="titlebar-current-directory">/home/duche/projects</span>
          </div>

          <div class="terminal-titlebar--right">

          </div>
        </div>

        <div class="terminal-body">

        </div>

        <div class="terminal-input">
          <div class="terminal-input--form">
            <p class="current-directory" id="current-directory">/home/duche/projects$</p>
            <input type="text">
          </div>
        </div>
      </div>
    </div>
  </main>

  <hr class="footer-divider">

  <div class="page-stats">
    <p>views: <span id="views">-</span></p>
  </div>

  <div class="page-last-updated">
    <p>created at: <span id="created-at">-</span></p>
    <p>updated at: <span id="last-updated-at">-</span></p>
  </div>

  <footer>
    <h4>built with desire by me</h4>
  </footer>

  <script src="../scripts/info.js"></script>
  <script src="../scripts/projects.js"></script>
  <script type="module" src="/scripts/entry-point.js"></script>
</body>
</html>
